version: "2"

linters:
  default: standard
  enable:
    - errorlint
    - copyloopvar
    - errname
  settings:
    errcheck:
      exclude-functions:
        # Progress bar updates — errors are cosmetic, not actionable.
        - (*github.com/schollz/progressbar/v3.ProgressBar).Add64
        - (*github.com/schollz/progressbar/v3.ProgressBar).Finish
  exclusions:
    rules:
      # Test files: relax errcheck.
      - path: '_test\.go'
        linters:
          - errcheck
