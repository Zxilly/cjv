version: 2
builds:
  - id: cjv
    main: ./cmd/cjv
    binary: cjv
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X main.updateURL=https://github.com/Zxilly/cjv/releases
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

  - id: cjv-mirror
    main: ./cmd/cjv
    binary: cjv-mirror
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X main.updateURL=https://github.com/Zxilly/cjv/releases
      - -X github.com/Zxilly/cjv/internal/config.DefaultManifestURL=https://raw.gitcode.com/Zxilly/cangjie-version-manifest/raw/master/versions.json
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: cjv
    ids: [cjv]
    name_template: "cjv_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
  - id: cjv-mirror
    ids: [cjv-mirror]
    name_template: "cjv-mirror_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"
