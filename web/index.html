<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cjv - 仓颉编程语言 SDK 工具链管理器</title>
  <meta name="description" content="cjv 是仓颉编程语言的 SDK 版本管理工具。">
  <link rel="preconnect" href="https://fonts.googleapis.cn" crossorigin>
  <link href="https://fonts.googleapis.cn/css?family=Noto+Sans+SC:400;500;700;800|JetBrains+Mono:400;500|Patua+One&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          colors: { cj: { DEFAULT: '#0fa968', light: '#34d399' } },
          fontFamily: {
            sans: ['"Noto Sans SC"', 'system-ui', '-apple-system', 'sans-serif'],
            mono: ['"JetBrains Mono"', '"Fira Code"', 'ui-monospace', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    [v-cloak] { display: none; }
    .install-box code { user-select: all; }
    .cj-gradient {
      background: linear-gradient(135deg, #0fa968 0%, #0891b2 50%, #6366f1 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    @media (prefers-color-scheme: dark) {
      .cj-gradient {
        background: linear-gradient(135deg, #34d399 0%, #22d3ee 50%, #a78bfa 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      }
    }
    .install-box::-webkit-scrollbar { height: 4px; }
    .install-box::-webkit-scrollbar-track { background: transparent; }
    .install-box::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
    .install-box::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    .install-box { scrollbar-width: thin; scrollbar-color: #d1d5db transparent; }
    @media (prefers-color-scheme: dark) {
      .install-box::-webkit-scrollbar-thumb { background: #374151; }
      .install-box::-webkit-scrollbar-thumb:hover { background: #4b5563; }
      .install-box { scrollbar-color: #374151 transparent; }
    }
    .slide-enter-active, .slide-leave-active {
      transition: grid-template-rows 0.3s ease;
      display: grid;
    }
    .slide-enter-from, .slide-leave-to { grid-template-rows: 0fr; }
    .slide-enter-to, .slide-leave-from { grid-template-rows: 1fr; }
    .slide-enter-active > *, .slide-leave-active > * { overflow: hidden; }
  </style>
</head>
<body class="bg-white dark:bg-gray-950 text-gray-800 dark:text-gray-200 antialiased overflow-x-hidden min-h-screen flex items-center">

  <div id="app" v-cloak class="max-w-2xl mx-auto px-4 md:px-6 py-12 md:py-24 overflow-x-hidden w-full">

    <!-- Header -->
    <h1 class="text-6xl sm:text-7xl md:text-8xl" style="font-family:'Patua One',serif; font-weight:400">
      <span class="cj-gradient" style="padding-bottom:0.15em; display:inline-block">cjv</span>
    </h1>
    <p class="mt-6 text-lg md:text-2xl text-gray-500 dark:text-gray-400">
      <a href="https://cangjie-lang.cn/" class="text-cj dark:text-cj-light hover:underline">仓颉</a>编程语言 SDK 工具链管理器
    </p>

    <!-- Install Card -->
    <div class="mt-10 rounded-lg border border-gray-200 dark:border-gray-800 divide-y divide-gray-200 dark:divide-gray-800">

      <!-- Primary: detected desktop OS -->
      <div v-if="state === 'ready'" class="p-6 text-center">
        <p class="text-base text-gray-500 dark:text-gray-400 mb-4">{{ info.hint }}</p>
        <code-block :command="info.command" primary></code-block>
        <p class="mt-4 text-sm text-gray-400 dark:text-gray-500">检测到你的平台：{{ info.label }}</p>
      </div>

      <!-- Unsupported mobile -->
      <div v-else-if="state === 'unsupported'" class="p-6 text-center">
        <p class="text-base text-gray-500 dark:text-gray-400">
          cjv 暂不支持 <strong class="text-gray-700 dark:text-gray-300">{{ info.label }}</strong> 平台。
        </p>
        <p class="mt-2 text-sm text-gray-400 dark:text-gray-500">cjv 目前支持 Linux、macOS 和 Windows 桌面系统。</p>
        <p class="mt-3 text-sm text-gray-400 dark:text-gray-500">
          请在桌面设备上访问此页面，或查看 <a href="https://github.com/Zxilly/cjv" class="text-cj dark:text-cj-light hover:underline">GitHub</a> 了解更多。
        </p>
      </div>

      <!-- Unknown -->
      <div v-else-if="state === 'unknown'" class="p-6 text-center">
        <p class="text-base text-gray-500 dark:text-gray-400">无法识别你的平台，以下是所有支持的安装方式。</p>
      </div>

      <!-- Other install methods -->
      <collapsible title="其他安装方式" :initial="state === 'unknown'">
        <div class="mt-3 space-y-3 text-sm">
          <div v-for="m in methods" :key="m.label">
            <p class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-1.5">{{ m.label }}</p>
            <code-block :command="m.command"></code-block>
          </div>
          <p class="text-sm text-gray-400">或从 <a href="https://github.com/Zxilly/cjv/releases" class="text-cj dark:text-cj-light hover:underline">GitHub Releases</a> 手动下载。</p>
        </div>
      </collapsible>

      <!-- Mirror -->
      <collapsible title="使用镜像源安装">
        <div class="mt-3 space-y-3 text-sm">
          <div v-for="m in mirrorMethods" :key="m.label">
            <p class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-1.5">{{ m.label }}</p>
            <code-block :command="m.command"></code-block>
          </div>
        </div>
      </collapsible>
    </div>

    <!-- Footer -->
    <div class="mt-12 text-center text-base text-gray-400 dark:text-gray-600 space-x-3">
      <a href="https://github.com/Zxilly/cjv" class="hover:text-cj dark:hover:text-cj-light">GitHub</a>
      <span>&middot;</span>
      <a href="https://github.com/Zxilly/cjv/releases" class="hover:text-cj dark:hover:text-cj-light">Releases</a>
      <span>&middot;</span>
      <a href="https://cangjie-lang.cn/" class="hover:text-cj dark:hover:text-cj-light">仓颉官网</a>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="main.js"></script>
</body>
</html>
