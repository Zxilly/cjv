name: Smoke

on:
  schedule:
    - cron: "0 8 * * *" # daily at 08:00 UTC
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest       # linux-amd64
          - os: ubuntu-24.04-arm    # linux-arm64
          - os: macos-latest        # darwin-arm64
          - os: macos-15-intel      # darwin-amd64
          - os: windows-latest      # windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: stable
      - name: Run smoke tests
        run: go test -v -tags smoke -count=1 -timeout 120s ./tests/smoke/
        env:
          CJV_GITCODE_API_KEY: ${{ secrets.CJV_GITCODE_API_KEY }}
