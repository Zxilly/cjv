name: Smoke

on:
  schedule:
    - cron: "0 8 * * *" # daily at 08:00 UTC
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest       # linux-amd64
          - os: ubuntu-24.04-arm    # linux-arm64
          - os: macos-latest        # darwin-arm64
          - os: windows-latest      # windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: Set up Cangjie
        uses: Zxilly/setup-cangjie@ff94aa01f985321ddfa5cd0973bb26b4c37e6010 # v2.1.1
        with:
          channel: sts
          version: latest
      - name: Run smoke tests
        run: go test -v -tags smoke -count=1 -timeout 120s ./tests/smoke/
        env:
          CJV_GITCODE_API_KEY: ${{ secrets.CJV_GITCODE_API_KEY }}
