name: Smoke

on:
  schedule:
    - cron: "0 8 * * *" # daily at 08:00 UTC
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest       # linux-amd64
          - os: ubuntu-24.04-arm    # linux-arm64
          - os: macos-latest        # darwin-arm64
          - os: windows-latest      # windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: Set up Cangjie
        uses: Zxilly/setup-cangjie@ff94aa01f985321ddfa5cd0973bb26b4c37e6010 # v2.1.1
        with:
          channel: sts
          version: latest
      - name: Run smoke tests
        run: go test -v -tags smoke -count=1 -timeout 120s ./tests/smoke/
        env:
          CJV_GITCODE_API_KEY: ${{ secrets.CJV_GITCODE_API_KEY }}
  central-repo-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Cangjie
        uses: Zxilly/setup-cangjie@ff94aa01f985321ddfa5cd0973bb26b4c37e6010 # v2.1.1
        with:
          channel: sts
          version: latest
      - name: Resolve latest release
        run: |
          TAG=$(gh release view --repo Zxilly/cjv --json tagName -q '.tagName')
          echo "CJV_TAG=$TAG" >> "$GITHUB_ENV"
          echo "CJV_VERSION=${TAG#v}" >> "$GITHUB_ENV"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Build central repository bundle
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          $repoRoot = Get-Location
          $packagingDir = Join-Path $repoRoot "packaging/cjv"
          $version = $env:CJV_VERSION
          $tag = $env:CJV_TAG
          $tmpRoot = Join-Path $env:TEMP ("cjv-central-bundle-" + [Guid]::NewGuid().ToString("N"))
          $pkgDir = Join-Path $tmpRoot "package"
          $archiveDir = Join-Path $repoRoot "artifacts/central-repo"
          try {
            New-Item -ItemType Directory -Path $pkgDir, $archiveDir -Force | Out-Null
            Copy-Item -Path (Join-Path $packagingDir "*") -Destination $pkgDir -Recurse
            (Get-Content (Join-Path $pkgDir "cjpm.toml")) -replace 'version = "X.Y.Z"', "version = `"$version`"" | Set-Content (Join-Path $pkgDir "cjpm.toml")
            (Get-Content (Join-Path $pkgDir "release.env")) -replace 'CJV_VERSION=X.Y.Z', "CJV_VERSION=$version" -replace 'CJV_TAG=vX.Y.Z', "CJV_TAG=$tag" | Set-Content (Join-Path $pkgDir "release.env")
            Push-Location $pkgDir
            try {
              & cjpm bundle
              $bundlePath = Join-Path $pkgDir "target/cjv-$version.cjp"
              if (-not (Test-Path $bundlePath)) { throw "bundle output missing: $bundlePath" }
              $bundleContents = & tar -tf $bundlePath
              if ($bundleContents -match '(^|/)(cjv(\.exe)?|.*\.(dll|dylib|exe|o|obj|so))$') { throw "bundle unexpectedly contains a binary payload" }
              Copy-Item -Path $bundlePath -Destination (Join-Path $archiveDir "cjv-$version.cjp") -Force
            } finally {
              Pop-Location
            }
          } finally {
            if (Test-Path $tmpRoot) { Remove-Item -LiteralPath $tmpRoot -Recurse -Force }
          }
      - name: Upload central repository bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: central-repo-cjp
          path: artifacts/central-repo/*.cjp
          if-no-files-found: error
  central-repo-install:
    needs: central-repo-bundle
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest       # linux-amd64
          - os: ubuntu-24.04-arm    # linux-arm64
          - os: macos-latest        # darwin-arm64
          - os: windows-latest      # windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up Cangjie
        uses: Zxilly/setup-cangjie@ff94aa01f985321ddfa5cd0973bb26b4c37e6010 # v2.1.1
        with:
          channel: sts
          version: latest
      - name: Download central repository bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: central-repo-cjp
          path: artifacts/central-repo
      - name: Install central repository bundle in clean environment
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          $bundlePath = Get-ChildItem ./artifacts/central-repo/*.cjp | Select-Object -First 1 -ExpandProperty FullName
          if (-not $bundlePath) { throw "bundle artifact missing" }
          $tmpRoot = Join-Path $env:TEMP ("cjv-central-smoke-" + [Guid]::NewGuid().ToString("N"))
          $extractRoot = Join-Path $tmpRoot "extract"
          $fakeHome = Join-Path $tmpRoot "home"
          try {
            New-Item -ItemType Directory -Path $extractRoot, $fakeHome -Force | Out-Null
            & tar -xzf $bundlePath -C $extractRoot
            $manifest = Get-ChildItem -Path $extractRoot -Recurse -Filter "cjpm.toml" | Select-Object -First 1
            if (-not $manifest) { throw "failed to locate cjpm.toml under extracted artifact" }
            $pkgDir = Split-Path -Parent $manifest.FullName
            $versionLine = Get-Content (Join-Path $pkgDir "release.env") | Where-Object { $_ -match '^CJV_VERSION=' } | Select-Object -First 1
            if (-not $versionLine) { throw "missing CJV_VERSION in release.env" }
            $version = ($versionLine -split '=', 2)[1].Trim()
            $realCjvHome = if ($env:CJV_HOME) { $env:CJV_HOME } elseif ($env:USERPROFILE) { Join-Path $env:USERPROFILE ".cjv" } else { "" }
            $env:HOME = $fakeHome
            $env:USERPROFILE = $fakeHome
            if (-not [string]::IsNullOrWhiteSpace($realCjvHome)) { $env:CJV_HOME = $realCjvHome }
            Push-Location $pkgDir
            try {
              & cjpm install --path $pkgDir
            } finally {
              Pop-Location
            }
            $installed = if ($IsWindows) { Join-Path $fakeHome ".cjpm\bin\cjv.exe" } else { Join-Path $fakeHome ".cjpm/bin/cjv" }
            if (-not (Test-Path $installed)) { throw "installed binary missing: $installed" }
            $versionOutput = & $installed --version
            if ($versionOutput -notmatch [regex]::Escape($version)) { throw "installed version mismatch: $versionOutput" }
          } finally {
            if (Test-Path $tmpRoot) { Remove-Item -LiteralPath $tmpRoot -Recurse -Force }
          }
