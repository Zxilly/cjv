name: Deploy static content to Pages

on:
  push:
    branches: ["master"]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: latest
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Build
        working-directory: web
        run: pnpm build
      - name: Download latest release archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p archives
          gh release download --repo "${GITHUB_REPOSITORY}" --dir archives \
            --pattern 'cjv_*' --pattern 'cjv-mirror_*'
          ls -lh archives
      - name: Extract cjv-init binaries by platform and variant
        run: |
          ARCHIVES_DIR=archives OUT_DIR=web/dist/dl bash scripts/extract-init-binaries.sh
          find web/dist/dl -type f | sort

      # Build the bilingual mdBook into web/dist/book/<lang>/ so it ships with the
      # Pages deploy. Must run after `pnpm build`, which clears web/dist.
      - name: Install mdbook
        env:
          MDBOOK_VERSION: "0.5.3"
        run: |
          mkdir -p "${RUNNER_TEMP}/mdbook-bin"
          curl -fsSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "${RUNNER_TEMP}/mdbook-bin"
          echo "${RUNNER_TEMP}/mdbook-bin" >> "$GITHUB_PATH"

      - name: Build the user guide
        working-directory: docs/user-guide
        run: |
          MDBOOK_OUTPUT__HTML__SITE_URL=/book/user-guide/zh-CN/ mdbook build -d ../../web/dist/book/user-guide/zh-CN
          MDBOOK_BOOK__SRC=en MDBOOK_BOOK__LANGUAGE=en MDBOOK_OUTPUT__HTML__SITE_URL=/book/user-guide/en/ mdbook build -d ../../web/dist/book/user-guide/en

      - name: Build the dev guide
        working-directory: docs/dev-guide
        run: |
          MDBOOK_OUTPUT__HTML__SITE_URL=/book/dev-guide/zh-CN/ mdbook build -d ../../web/dist/book/dev-guide/zh-CN
          MDBOOK_BOOK__SRC=en MDBOOK_BOOK__LANGUAGE=en MDBOOK_OUTPUT__HTML__SITE_URL=/book/dev-guide/en/ mdbook build -d ../../web/dist/book/dev-guide/en

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: 'web/dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
