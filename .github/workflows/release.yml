name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure stable tag
        run: |
          if ! [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Only stable tags trigger a release"
            exit 1
          fi
      - name: Enable TCP BBR
        uses: Zxilly/actions-bbr@c3a8ea7012db3c0f4d5fcf6dd257c28f4cba9ead # v1.0.1
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: Mirror repository to GitCode
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
        run: |
          git remote add gitcode "https://Zxilly:${GITCODE_TOKEN}@gitcode.com/Zxilly/cjv.git"
          git push gitcode "HEAD:refs/heads/master"
          git push gitcode "${GITHUB_REF}"
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload mirror binaries to GitCode
        uses: Zxilly/upload-gitcode-release@4ecd2bfd44008dd4f2b2487eda7a2e7bbbf12a1b # v1.0.0
        with:
          gitcode-token: ${{ secrets.GITCODE_TOKEN }}
          target-repo: Zxilly/cjv
          tag: ${{ github.ref_name }}
          target-commitish: ${{ github.sha }}
          body: "See https://github.com/Zxilly/cjv/releases/tag/${{ github.ref_name }} for the full changelog."
          files: |
            dist/cjv-mirror_*.tar.gz
            dist/cjv-mirror_*.zip
            dist/checksums.txt
