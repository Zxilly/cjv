name: CI
on:
  push:
    branches: [master]
  pull_request:

jobs:
  go-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            race: -race
          - os: ubuntu-24.04-arm
            race: -race
          - os: macos-26
            race: -race
          - os: macos-26-intel
            race: -race
          - os: windows-2025
            race: -race
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: Build all packages
        run: go build ./...
      - name: Build mirror variant
        run: go build -tags=mirror ./...
      - name: Run tests
        run: go test ${{ matrix.race }} -count=1 -timeout 300s ./...
      - name: Run mirror tests
        run: go test -tags=mirror ${{ matrix.race }} -count=1 -timeout 300s ./internal/selfupdate/...
      - name: Run go vet
        run: go vet ./...
      - name: Run go vet (mirror)
        run: go vet -tags=mirror ./...

  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest

  cross-build:
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o /dev/null ./cmd/cjv/

  mod-check:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: Verify module integrity
        run: go mod verify

  vuln-check:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  web-build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: latest
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Build web
        working-directory: web
        run: pnpm build

  web-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: latest
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Resolve Playwright version
        id: playwright-version
        working-directory: web
        shell: bash
        run: |
          version=$(node -p "require('playwright/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright Chromium
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright Chromium
        working-directory: web
        timeout-minutes: 15
        env:
          DEBUG: pw:install
          PLAYWRIGHT_SKIP_BROWSER_GC: '1'
        run: pnpm exec playwright install --with-deps chromium
      - name: Run tests
        working-directory: web
        env:
          VITEST_BROWSER: chromium
        run: pnpm exec vitest run --exclude src/App.platform.integration.test.tsx

  web-coverage:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: latest
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Resolve Playwright version
        id: playwright-version
        working-directory: web
        shell: bash
        run: |
          version=$(node -p "require('playwright/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright Chromium
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright Chromium
        working-directory: web
        timeout-minutes: 15
        env:
          DEBUG: pw:install
          PLAYWRIGHT_SKIP_BROWSER_GC: '1'
        run: pnpm exec playwright install --with-deps chromium
      - name: Run coverage
        working-directory: web
        env:
          VITEST_BROWSER: chromium
        run: pnpm coverage

  web-browser-integration:
    name: Web integration (${{ matrix.runner.os }} · ${{ matrix.runner.platform_os }}, ${{ matrix.browser }})
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        runner:
          - os: windows-11-arm
            arch: arm64
            platform_os: Windows
            platform_arch: arm64
            expected_state: unsupported
            expected_label: Windows arm64
            expected_binary_goos: ''
            expected_binary_goarch: ''
          - os: macos-26-intel
            arch: amd64
            platform_os: Mac OS
            platform_arch: ''
            expected_state: ready
            expected_label: macOS
            expected_binary_goos: ''
            expected_binary_goarch: ''
          - os: macos-26
            arch: arm64
            platform_os: Mac OS
            platform_arch: ''
            expected_state: ready
            expected_label: macOS
            expected_binary_goos: ''
            expected_binary_goarch: ''
          - os: windows-2025
            arch: amd64
            platform_os: Windows
            platform_arch: amd64
            expected_state: ready
            expected_label: Windows x86_64
            expected_binary_goos: windows
            expected_binary_goarch: amd64
          - os: ubuntu-24.04
            arch: amd64
            platform_os: Linux
            platform_arch: amd64
            expected_state: ready
            expected_label: Linux x86_64
            expected_binary_goos: linux
            expected_binary_goarch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
            platform_os: Linux
            platform_arch: arm64
            expected_state: ready
            expected_label: Linux ARM64
            expected_binary_goos: linux
            expected_binary_goarch: arm64
          - os: ubuntu-24.04
            arch: amd64
            platform_os: iOS
            platform_arch: ''
            expected_state: unsupported
            expected_label: iOS
            expected_binary_goos: ''
            expected_binary_goarch: ''
          - os: ubuntu-24.04
            arch: amd64
            platform_os: Android
            platform_arch: ''
            expected_state: unsupported
            expected_label: Android
            expected_binary_goos: ''
            expected_binary_goarch: ''
    runs-on: ${{ matrix.runner.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: latest
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Resolve Playwright version
        id: playwright-version
        working-directory: web
        shell: bash
        run: |
          version=$(node -p "require('playwright/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browser
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
            ~/AppData/Local/ms-playwright
          key: playwright-${{ matrix.runner.os }}-${{ matrix.browser }}-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright browser with Linux deps
        if: runner.os == 'Linux'
        working-directory: web
        timeout-minutes: 15
        env:
          DEBUG: pw:install
          PLAYWRIGHT_SKIP_BROWSER_GC: '1'
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}
      - name: Install Playwright browser
        if: runner.os != 'Linux'
        working-directory: web
        timeout-minutes: 15
        env:
          DEBUG: pw:install
          PLAYWRIGHT_SKIP_BROWSER_GC: '1'
        run: pnpm exec playwright install ${{ matrix.browser }}
      - name: Run platform integration tests
        working-directory: web
        env:
          VITEST_BROWSER: ${{ matrix.browser }}
          VITE_EXPECTED_BINARY_GOARCH: ${{ matrix.runner.expected_binary_goarch }}
          VITE_EXPECTED_BINARY_GOOS: ${{ matrix.runner.expected_binary_goos }}
          VITE_EXPECTED_BROWSER: ${{ matrix.browser }}
          VITE_EXPECTED_LABEL: ${{ matrix.runner.expected_label }}
          VITE_EXPECTED_PLATFORM_ARCH: ${{ matrix.runner.platform_arch }}
          VITE_EXPECTED_PLATFORM_OS: ${{ matrix.runner.platform_os }}
          VITE_EXPECTED_PLAYWRIGHT_BROWSER: ${{ matrix.browser }}
          VITE_EXPECTED_RUNNER: ${{ matrix.runner.os }}
          VITE_EXPECTED_RUNNER_ARCH: ${{ matrix.runner.arch }}
          VITE_EXPECTED_STATE: ${{ matrix.runner.expected_state }}
        run: pnpm test:integration

  install-script-integration:
    name: Installer (${{ matrix.label }})
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux sh
            os: ubuntu-24.04
            kind: unix
            shell_name: sh
            apt_packages: ''
            brew_packages: ''
            default_toolchain: ''
          - label: linux bash
            os: ubuntu-24.04
            kind: unix
            shell_name: bash
            apt_packages: ''
            brew_packages: ''
            default_toolchain: ''
          - label: linux zsh
            os: ubuntu-24.04
            kind: unix
            shell_name: zsh
            apt_packages: zsh
            brew_packages: ''
            default_toolchain: ''
          - label: linux fish
            os: ubuntu-24.04
            kind: unix
            shell_name: fish
            apt_packages: fish
            brew_packages: ''
            default_toolchain: ''
          - label: linux arm64 sh
            os: ubuntu-24.04-arm
            kind: unix
            shell_name: sh
            apt_packages: ''
            brew_packages: ''
            default_toolchain: ''
          - label: macos arm64 bash
            os: macos-26
            kind: unix
            shell_name: bash
            apt_packages: ''
            brew_packages: ''
            default_toolchain: ''
          - label: macos arm64 zsh
            os: macos-26
            kind: unix
            shell_name: zsh
            apt_packages: ''
            brew_packages: ''
            default_toolchain: ''
          - label: macos arm64 fish
            os: macos-26
            kind: unix
            shell_name: fish
            apt_packages: ''
            brew_packages: fish
            default_toolchain: ''
          - label: macos intel bash
            os: macos-26-intel
            kind: unix
            shell_name: bash
            apt_packages: ''
            brew_packages: ''
            default_toolchain: ''
          - label: macos intel zsh
            os: macos-26-intel
            kind: unix
            shell_name: zsh
            apt_packages: ''
            brew_packages: ''
            default_toolchain: ''
          - label: macos intel fish
            os: macos-26-intel
            kind: unix
            shell_name: fish
            apt_packages: ''
            brew_packages: fish
            default_toolchain: ''
          - label: windows powershell legacy host
            os: windows-2025
            kind: powershell
            shell_name: 'C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe'
            apt_packages: ''
            brew_packages: ''
            default_toolchain: all
          - label: windows pwsh latest
            os: windows-2025
            kind: powershell
            shell_name: pwsh
            apt_packages: ''
            brew_packages: ''
            default_toolchain: all
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: Install Linux test shells
        if: matrix.kind == 'unix' && runner.os == 'Linux' && matrix.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}
      - name: Install macOS test shells
        if: matrix.kind == 'unix' && runner.os == 'macOS' && matrix.brew_packages != ''
        run: brew install ${{ matrix.brew_packages }}
      - name: Show Unix shell version
        if: matrix.kind == 'unix'
        run: command -v ${{ matrix.shell_name }} && ${{ matrix.shell_name }} --version || true
      - name: Show PowerShell version
        if: matrix.kind == 'powershell'
        shell: pwsh
        env:
          CJV_INSTALL_TEST_POWERSHELL: ${{ matrix.shell_name }}
        run: |
          $shell = Get-Command $env:CJV_INSTALL_TEST_POWERSHELL -ErrorAction Stop
          $shellPath = if ($shell.Path) { $shell.Path } else { $shell.Source }
          & $shellPath -NoProfile -Command '$PSVersionTable.PSVersion.ToString()'
      - name: Run install.sh integration
        if: matrix.kind == 'unix'
        env:
          CJV_INSTALL_TEST_SHELL: ${{ matrix.shell_name }}
        run: go test -v -tags "integration installscript" -run '^TestIntegrationInstallScriptShFromConfiguredShell$' -count=1 -timeout 15m ./tests/integration/
      - name: Run install.ps1 integration
        if: matrix.kind == 'powershell'
        env:
          CJV_INSTALL_TEST_DEFAULT_TOOLCHAIN: ${{ matrix.default_toolchain }}
          CJV_INSTALL_TEST_POWERSHELL: ${{ matrix.shell_name }}
        run: go test -v -tags "integration installscript" -run '^TestIntegrationInstallScriptPs1FromConfiguredPowerShell$' -count=1 -timeout 15m ./tests/integration/

  go-integration:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            race: -race
          - os: ubuntu-24.04-arm
            race: -race
          - os: macos-26
            race: -race
          - os: macos-26-intel
            race: -race
          - os: windows-2025
            race: -race
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: Run integration tests
        run: go test ${{ matrix.race }} -v -tags integration -count=1 ./tests/integration/
